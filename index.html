<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitBalance</title>
    <meta name="description" content="Інтерактивний персональний щоденник для відстеження фізичної активності та харчування." />
    <link rel="stylesheet" href="./styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- BR.Z Sanction Warning -->
    <div id="sanction-overlay" class="hidden">
      <div class="sanction-content">
        <h1 class="sanction-text">Слабовольна тряпка!</h1>
        <p>Ти пропустив день. Весь твій прогрес обнулено. Починай з чистого листа.</p>
        <button id="accept-sanction-btn" class="primary-btn">Зрозуміло</button>
      </div>
    </div>

    <!-- Settings Modal -->
    <dialog id="settings-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal" id="close-settings">&times;</span>
        
        <section class="settings-section">
          <h2>Профіль</h2>
          <div class="form-group-row">
            <div class="form-group">
              <label>Ім'я *</label>
              <input type="text" id="profile-name" placeholder="Ім'я" pattern="[A-Za-zА-Яа-яЁёІіЇїЄєҐґ']+" title="Тільки літери">
            </div>
            <div class="form-group">
              <label>Прізвище (необов'язково)</label>
              <input type="text" id="profile-lastname" placeholder="Прізвище" pattern="[A-Za-zА-Яа-яЁёІіЇїЄєҐґ']*" title="Тільки літери">
            </div>
          </div>
          <div class="form-group-row">
            <div class="form-group">
                <label>Вік *</label>
                <input type="number" id="profile-age" min="1" max="120" placeholder="Вік">
            </div>
            <div class="form-group">
                <label>Стать *</label>
                <select id="profile-gender">
                    <option value="Не вказувати">Не вказувати</option>
                    <option value="Чоловіча">Чоловіча</option>
                    <option value="Жіноча">Жіноча</option>
                </select>
            </div>
          </div>
          <div class="form-group-row">
            <div class="form-group">
                <label>Вага (кг) *</label>
                <input type="number" id="profile-weight" min="1" step="0.1" placeholder="0">
            </div>
            <div class="form-group">
                <label>Зріст (см) *</label>
                <input type="number" id="profile-height" min="50" step="1" placeholder="180">
            </div>
          </div>
          <div id="bmi-display" class="highlight-badge">BMI: -</div>
        </section>

        <section class="settings-section">
          <h2>Цілі</h2>
          <div class="form-group">
            <label>Калорії (ккал)</label>
            <input type="number" id="goal-calories" min="1">
          </div>
          <div class="form-group-row">
            <div class="form-group">
                <label>Білки (г)</label>
                <input type="number" id="goal-protein" min="0">
            </div>
            <div class="form-group">
                <label>Жири (г)</label>
                <input type="number" id="goal-fat" min="0">
            </div>
            <div class="form-group">
                <label>Вуглеводи (г)</label>
                <input type="number" id="goal-carbs" min="0">
            </div>
          </div>

          <h3>Мотиватор</h3>
          <div class="form-group">
              <select id="motivator-select">
                  <option value="Потужний Михайло">Потужний Михайло</option>
                  <option value="Марта Нутріціолог">Марта Нутріціолог</option>
                  <option value="Денчик Нінзя">Денчик Нінзя</option>
                  <option value="Юлія Астролог">Юлія Астролог</option>
              </select>
          </div>
          <button id="save-settings-btn" class="primary-btn">Зберегти налаштування</button>
        </section>
      </div>
    </dialog>

    <div class="app-container">
      <header>
        <h1>FitBalance</h1>
        <!-- Gear icon acts as settings toggle by default -->
        <button id="open-settings-btn" class="icon-btn">⚙️</button>
      </header>

      <div class="dashboard-section">
        <div class="dashboard-header">
            <h2 id="current-date-header">День: -</h2>
            <div class="status-selector">
                <label>Статус дня:</label>
                <select id="status-select">
                    <option value="">Не вибрано</option>
                    <option value="Тренування">Тренування</option>
                    <option value="Відпочинок">Відпочинок</option>
                    <option value="Хвороба">Хвороба</option>
                    <option value="Відпустка">Відпустка</option>
                </select>
            </div>
        </div>

        <!-- Motivator Floating Toast -->
        <div id="motivator-toast" class="toast hidden">
          <span id="close-toast" class="close-toast">&times;</span>
          <div id="motivator-message-content"></div>
        </div>

        <h3>Календар активності</h3>
        <div id="calendar-container"></div>
        
        <div class="logs-grid">
            <!-- Workout Log -->
            <div class="log-panel">
                <h3>Журнал тренувань</h3>
                <div id="workout-list-container" class="list-container"></div>
                
                <div class="add-form">
                    <div id="workout-rows-container">
                        <!-- Dynamic rows will be rendered here by JS -->
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button id="add-workout-row-btn" class="outline-btn" style="width: auto;">+ Додати ще вправу</button>
                        <button id="save-workouts-btn" class="secondary-btn">Зберегти тренування</button>
                    </div>
                </div>
            </div>

            <!-- Food Log -->
            <div class="log-panel">
                <h3>Журнал харчування</h3>
                <div id="food-summary-container" class="list-container"></div>

                <div class="add-form">
                    <h4>Додати прийом їжі</h4>
                    <div class="form-group-row">
                        <input type="number" id="food-calories" placeholder="Ккал" min="0" step="1">
                        <input type="number" id="food-protein" placeholder="Білки" min="0" step="1">
                    </div>
                    <div class="form-group-row">
                        <input type="number" id="food-fat" placeholder="Жири" min="0" step="1">
                        <input type="number" id="food-carbs" placeholder="Вуглеводи" min="0" step="1">
                    </div>
                    <button id="save-food-btn" class="secondary-btn">Додати їжу</button>
                </div>
            </div>
        </div>
      </div>

      <footer class="demo-controls">
        <button id="reset-demo-btn" class="outline-btn">Reset demo data</button>
        <button id="flush-data-btn" class="outline-btn danger">Clear all data</button>
      </footer>
    </div>
    
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
